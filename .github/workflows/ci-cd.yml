name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_HUB_USERNAME: prashanthvedarathna

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [product-service, order-service, user-service]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Build with Maven
      run: |
        cd ${{ matrix.service }}
        mvn clean package
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ env.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./${{ matrix.service }}
        push: true
        tags: |
          ${{ env.DOCKER_HUB_USERNAME }}/${{ matrix.service }}:latest
          ${{ env.DOCKER_HUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.DOCKER_HUB_USERNAME }}/${{ matrix.service }}:buildcache
        cache-to: type=registry,ref=${{ env.DOCKER_HUB_USERNAME }}/${{ matrix.service }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Set up Kubernetes config
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
    
    - name: Update deployments with new image
      run: |
        kubectl set image deployment/product-service product-service=prashanthvedarathna/product-service:${{ github.sha }} --record
        kubectl set image deployment/order-service order-service=prashanthvedarathna/order-service:${{ github.sha }} --record
        kubectl set image deployment/user-service user-service=prashanthvedarathna/user-service:${{ github.sha }} --record
    
    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/product-service
        kubectl rollout status deployment/order-service
        kubectl rollout status deployment/user-service